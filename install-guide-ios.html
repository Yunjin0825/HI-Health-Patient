<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앱 설치 안내 - iPhone</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f1f5f9; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .card { width:540px; height:540px; background:#fff; border-radius:32px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 8px 40px rgba(0,0,0,0.10); }
  .top { background:#1e1047; padding:24px 28px 20px; display:flex; align-items:center; gap:18px; }
  .mascot { width:80px; height:80px; object-fit:contain; flex-shrink:0; }
  .top-text { flex:1; }
  .top-tag { display:inline-block; background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.75); font-size:10px; font-weight:700; letter-spacing:1.5px; padding:3px 10px; border-radius:999px; margin-bottom:8px; }
  .top-title { color:#fff; font-size:21px; font-weight:800; letter-spacing:-0.5px; line-height:1; white-space:nowrap; }
  .top-sub { color:rgba(255,255,255,0.5); font-size:12px; margin-top:5px; }
  .os-pill { display:inline-block; background:#7c3aed; color:#fff; font-size:10px; font-weight:800; padding:3px 10px; border-radius:999px; margin-top:7px; }
  .steps { padding:20px 24px; display:flex; flex-direction:column; gap:12px; flex:1; }
  .step { display:flex; align-items:center; gap:14px; background:#f8fafc; border-radius:14px; padding:13px 16px; border:1px solid #f1f5f9; }
  .num { width:30px; height:30px; border-radius:50%; background:#1e1047; color:#fff; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .step-body { flex:1; }
  .step-title { color:#1e293b; font-size:13.5px; font-weight:700; margin-bottom:2px; }
  .step-desc { color:#64748b; font-size:11.5px; line-height:1.55; }
  .step-desc strong { color:#1e1047; font-weight:700; }
  .icon-box { display:inline-flex; align-items:center; justify-content:center; background:#e2e8f0; border-radius:5px; padding:2px 6px; vertical-align:middle; margin:0 1px; }
  .footer { background:#f8fafc; border-top:1px solid #f1f5f9; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; }
  .url { color:#94a3b8; font-size:11px; }
  .tip { background:#ede9fe; border-radius:8px; padding:5px 11px; }
  .tip-text { color:#7c3aed; font-size:11px; font-weight:700; }
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <img class="mascot" src="images/avatars/hi_health_home_2.png" alt="HI Health 홈 화면">
    <div class="top-text">
      <div class="top-tag">HI HEALTH</div>
      <div class="top-title">홈 화면에 앱 설치하기</div>
      <div class="top-sub">설치하면 앱처럼 바로 열 수 있어요</div>
      <div class="os-pill">iPhone · Safari</div>
    </div>
  </div>
  <div class="steps">
    <div class="step">
      <div class="num">1</div>
      <div class="step-body">
        <div class="step-title">Safari로 열기</div>
        <div class="step-desc">카카오톡 링크 하단 <strong>공유 탭</strong> → <strong>Safari로 열기</strong></div>
      </div>
    </div>
    <div class="step">
      <div class="num">2</div>
      <div class="step-body">
        <div class="step-title">상단 공유 버튼 탭</div>
        <div class="step-desc">주소창 옆 <span class="icon-box"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></span> 버튼 → 아래 화살표 <strong>더보기(↓)</strong></div>
      </div>
    </div>
    <div class="step">
      <div class="num">3</div>
      <div class="step-body">
        <div class="step-title">홈 화면에 추가</div>
        <div class="step-desc"><strong>'+ 홈 화면에 추가'</strong> 탭 → 오른쪽 위 <strong>'추가'</strong></div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="url">hi-fertility-health.com</div>
    <div class="tip"><div class="tip-text">카카오톡에서 바로 설치 불가</div></div>
  </div>
</div>
</body>
</html>
