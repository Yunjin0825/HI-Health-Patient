<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.22;

  // background rounded rect
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#5B8AF5';
  ctx.fill();

  // heart
  const cx = s * 0.5, cy = s * 0.45, hw = s * 0.28;
  ctx.beginPath();
  ctx.moveTo(cx, cy + hw * 0.9);
  ctx.bezierCurveTo(cx - hw * 1.2, cy + hw * 0.3, cx - hw * 1.4, cy - hw * 0.5, cx - hw * 0.7, cy - hw * 0.7);
  ctx.bezierCurveTo(cx - hw * 0.2, cy - hw * 0.9, cx, cy - hw * 0.4, cx, cy - hw * 0.1);
  ctx.bezierCurveTo(cx, cy - hw * 0.4, cx + hw * 0.2, cy - hw * 0.9, cx + hw * 0.7, cy - hw * 0.7);
  ctx.bezierCurveTo(cx + hw * 1.4, cy - hw * 0.5, cx + hw * 1.2, cy + hw * 0.3, cx, cy + hw * 0.9);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fill();

  // HI text
  ctx.fillStyle = '#5B8AF5';
  ctx.font = `900 ${s * 0.17}px "Arial Black", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('HI', cx, cy);
}

['c192','c512'].forEach(id => {
  const c = document.getElementById(id);
  drawIcon(c);
  const a = document.createElement('a');
  a.download = 'icon-' + c.width + '.png';
  a.href = c.toDataURL('image/png');
  a.textContent = 'Download icon-' + c.width + '.png';
  a.style.display = 'block';
  a.style.margin = '10px';
  document.body.appendChild(a);
});
</script>
</body>
</html>
